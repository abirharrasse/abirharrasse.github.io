<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Title · Abir Harrasse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --bg2:#f5e8e8; --bg3:#e8d0d0; --tan:#D96868;
  --green:#4C5C2D; --orange:#6a7e3f; --tx:#2a1010; --txm:#3a2020; --txl:#7a5050;
  --nav-bg:rgba(255,255,255,0.96);
}
[data-theme="dark"] {
  --bg:#0a0a0a; --bg2:#111111; --bg3:#1c1c1c; --tan:#D96868;
  --green:#6a7e3f; --orange:#6a7e3f; --tx:#eeeae2; --txm:#c8c4b8; --txl:#8a9e8e;
  --nav-bg:#0a0a0a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Source Serif 4','Lora',Georgia,serif;
  font-size:17px; line-height:1.78; color:var(--tx); background:var(--bg);
  max-width:780px; margin:0 auto; padding:0 28px 32px;
  transition:background .25s,color .25s;
}
a { color:var(--green); text-decoration:none; border-bottom:1px dotted var(--tan); }
a:hover { color:var(--orange); border-color:var(--orange); }
nav {
  position:sticky; top:0; background:var(--nav-bg); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--bg2); padding:13px 28px; margin:0 -28px 44px;
  display:flex; align-items:center; flex-wrap:wrap; gap:22px;
}
nav a { font-family:'Lora',serif; font-size:15px; color:var(--txm); border-bottom:2px solid transparent; }
nav a.home { color:var(--green); font-weight:600; }
h1 { font-family:'Amiri',serif; font-size:44px; line-height:1.12; color:var(--green); margin-bottom:6px; }
.meta { font-family:'Lora',serif; font-size:14px; color:var(--txl); margin-bottom:28px; }
p { color:var(--txm); margin-bottom:18px; }
h2 { font-family:'Amiri',serif; color:var(--green); font-size:28px; margin:34px 0 10px; }
#theme-btn {
  margin-left:auto; background:none; border:1.5px solid var(--bg3); border-radius:20px;
  padding:3px 10px; cursor:pointer; font-size:13px; color:var(--txl); font-family:'Lora',serif;
}
@media(max-width:680px){
  h1{font-size:34px;} nav{gap:14px;} nav a{font-size:13px;}
}
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="home">Abir Harrasse</a>
  <a href="../index.html#blog">Blog</a>
  <button id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode"><span id="theme-icon">🌙</span> <span id="theme-label">dark</span></button>
</nav>

<article>
  <h1>Post Title</h1>
  <div class="meta">Month YYYY</div>

  <p>Write the opening paragraph here.</p>

  <h2>Section Heading</h2>
  <p>Continue the post here.</p>
</article>

<script>
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? 'dark' : 'light';
}
(function(){
  const saved=localStorage.getItem('theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    window.addEventListener('DOMContentLoaded',()=>{
      document.getElementById('theme-icon').textContent='☀️';
      document.getElementById('theme-label').textContent='light';
    });
  }
})();
</script>
</body>
</html>
